  <style>

/* card style using box model */
.card {
  width: 150px;

  margin: 10px;        /* outside space */
  border: 2px solid black;  /* border */
  padding: 10px;       /* inside space */

  text-align: center;
  display: inline-block;
}

/* highlight 3rd card */
.card:nth-child(3) {
  border: 2px solid orange;
}

</style>
</head>

<body>
